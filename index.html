<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ez LAN Triathlon</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #2a2a72, #0f0c29);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app {
  width:100%;
  max-width:420px;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:25px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  text-align:center;
  animation: fadeIn 0.4s ease;
}

h1 {
  font-size:20px;
  margin-bottom:10px;
}

h2 {
  font-size:16px;
  opacity:0.7;
}

.question {
  margin:20px 0;
  font-size:18px;
}

input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  margin-top:10px;
  text-align:center;
}

button {
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  background: linear-gradient(90deg,#00c6ff,#ff7b00);
  color:white;
  cursor:pointer;
}

button:active {
  transform:scale(0.97);
}

.progress {
  margin-top:10px;
  font-size:12px;
  opacity:0.5;
}

.success {
  color:#00ffae;
}

.error {
  color:#ff4d4d;
}

.code {
  font-size:32px;
  letter-spacing:4px;
  margin-top:15px;
  font-weight:bold;
  color:#00c6ff;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
  <div class="card" id="app"></div>
</div>

<script>

let step = 0;
let message = "";

const games = [
  {
    q:"2 → 6 → 7 → 21 → 22 → ?",
    check:(a)=> a=="66"
  },
  {
    q:"C L U T H C X → mot ?",
    check:(a)=> a.toLowerCase()=="clutch"
  },
  {
    q:"Couleurs du maillot ?",
    check:(a)=>{
      a=a.toLowerCase();
      return a.includes("bleu") && a.includes("violet") && a.includes("orange");
    }
  },
  {
    q:"Sponsor voiture ?",
    check:(a)=> a.toLowerCase()=="bmw"
  },
  {
    q:"Combien de gourdes ?",
    check:(a)=> a=="4"
  },
  {
    q:"Sensi Ameel CS ?",
    check:(a)=> a=="2" // à modifier
  },
  {
    q:"PCMR signifie ?",
    check:(a)=> a.toLowerCase().includes("master")
  },
  {
    q:"Je suis impair → enlève une lettre → pair",
    check:(a)=> a.toLowerCase()=="sept"
  },
  {
    q:"3 chats → 3 souris → 3 min. 100 souris → ? chats ?",
    check:(a)=> a=="3"
  }
];

// mélange
games.sort(()=>Math.random()-0.5);

function render(){

  if(step >= games.length){
    endGame();
    return;
  }

  document.getElementById("app").innerHTML = `
    <h1>🏁 Ez LAN Triathlon</h1>
    <h2>Épreuve ${step+1} / ${games.length}</h2>

    <div class="question">${games[step].q}</div>

    <input id="answer" placeholder="Ta réponse...">

    <button onclick="submit()">Valider</button>

    <div class="progress">${message}</div>
  `;
}

function submit(){
  const val = document.getElementById("answer").value;

  if(games[step].check(val)){
    message = "✅ Correct";
    step++;
    setTimeout(render, 300);
  } else {
    message = "❌ Mauvaise réponse";
    render();
  }
}

function generateCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="";
  for(let i=0;i<5;i++){
    code+=chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

function endGame(){
  const code = generateCode();

  document.getElementById("app").innerHTML = `
    <h1>🎉 Bravo !</h1>
    <p>Montre ce code :</p>
    <div class="code">${code}</div>
  `;
}

render();

</script>

</body>
</html>
